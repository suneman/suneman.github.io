<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Network favicon for sunelehmann.com.
       4 nodes (triangle + pendant) connected by 4 edges. Burnt-sienna accent.
       Designed to read clearly down to 16px. Edit `color` to retheme. -->
  <g fill="#A0431E" stroke="#A0431E" stroke-width="2.5" stroke-linecap="round">
    <line x1="16" y1="7" x2="8" y2="18"/>
    <line x1="16" y1="7" x2="24" y2="18"/>
    <line x1="8" y1="18" x2="24" y2="18"/>
    <line x1="24" y1="18" x2="22" y2="27"/>
  </g>
  <g fill="#A0431E">
    <circle cx="16" cy="7" r="3.5"/>
    <circle cx="8" cy="18" r="3.5"/>
    <circle cx="24" cy="18" r="3.5"/>
    <circle cx="22" cy="27" r="3"/>
  </g>
</svg>
